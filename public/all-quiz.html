<!DOCTYPE html>
<html>

<head>

<title>All Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#120024,#3b0071,#180032);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

.menu a:hover{
color:#00e5ff;
}

.hamburger{
display:none;
font-size:26px;
cursor:pointer;
}

/* PAGE */

.container{
padding:60px 8%;
}

h2{
margin-bottom:40px;
font-size:30px;
}

/* QUIZ GRID */

.quiz-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* QUIZ CARD */

.quiz-card{

background:rgba(255,255,255,0.07);

backdrop-filter:blur(15px);

padding:25px;

border-radius:14px;

box-shadow:0 15px 35px rgba(0,0,0,0.4);

transition:0.35s;

}

.quiz-card:hover{
transform:translateY(-8px) scale(1.02);
background:rgba(255,255,255,0.1);
}

/* PROFILE */

.profile{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px;
}

.profile img{
width:42px;
height:42px;
border-radius:50%;
}

/* TEXT */

.quiz-title{
font-size:18px;
font-weight:600;
}

.quiz-desc{
opacity:.85;
font-size:14px;
margin:12px 0;
line-height:1.5;
}

.quiz-meta{
font-size:13px;
opacity:.7;
margin-bottom:15px;
}

/* BUTTONS */

.actions{
display:flex;
gap:12px;
}

.actions button{
border:none;
padding:9px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
transition:.3s;
}

.start{
background:#00c853;
color:white;
}

.start:hover{
background:#00b34a;
}

.delete{
background:#ff5252;
color:white;
}

.delete:hover{
background:#ff2a2a;
}
/* ================= MOBILE RESPONSIVE ================= */

@media (max-width:768px){

/* NAVBAR */

nav{
padding:15px 20px;
}

.logo{
font-size:18px;
}

/* HAMBURGER */

.hamburger{
display:block;
font-size:26px;
}

/* MOBILE MENU */

.menu{
display:none;
flex-direction:column;
position:absolute;
top:65px;
right:15px;
width:220px;
background:#1b0036;
border-radius:10px;
padding:12px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.menu.active{
display:flex;
}

.menu a{
padding:12px 20px;
display:block;
}

/* PAGE */

.container{
padding:30px 20px;
}

/* TITLE */

h2{
font-size:24px;
margin-bottom:25px;
}

/* GRID */

.quiz-grid{
grid-template-columns:1fr;
gap:20px;
}

/* CARD */

.quiz-card{
padding:20px;
}

/* PROFILE */

.profile{
align-items:center;
gap:10px;
}

.profile img{
width:36px;
height:36px;
}

/* TITLE */

.quiz-title{
font-size:16px;
}

/* DESCRIPTION */

.quiz-desc{
font-size:13px;
line-height:1.4;
}

/* META */

.quiz-meta{
font-size:12px;
}

/* BUTTONS */

.actions{
flex-direction:column;
gap:10px;
margin-top:10px;
}

.actions button{
width:100%;
padding:10px;
font-size:14px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">CSE TRE4.0</div>

<div class="menu" id="menu">

<a href="/">Home</a>
<a href="all-quiz.html?category=ALL">All Quiz</a>
<a href="all-quiz.html?category=CS">CS</a>
<a href="all-quiz.html?category=GKGS">GKGS</a>
<a href="create.html">Create Quiz</a>

</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</nav>

<!-- PAGE -->

<div class="container">

<h2 id="title"></h2>

<div class="quiz-grid" id="quizGrid"></div>

</div>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

const params = new URLSearchParams(window.location.search)

const category = params.get("category") || "ALL"

document.getElementById("title").innerText = category + " Quizzes"

loadQuiz()

async function loadQuiz(){

let res = await fetch("/api/quiz/all?category="+category)

let quizzes = await res.json()

let html=""

quizzes.forEach(q=>{

html+=`

<div class="quiz-card">

<div class="profile">

<img src="${q.profile || 'https://ui-avatars.com/api/?name='+q.createdBy}">

<div>

<div class="quiz-title">${q.title}</div>

<div class="quiz-meta">Created by ${q.createdBy}</div>

</div>

</div>

<div class="quiz-desc">${q.description || "-"}</div>

<div class="quiz-meta">Category: ${q.category || "-"}</div>

<div class="actions">

<button class="start" onclick="startQuiz('${q.quizCode}')">
Start Quiz
</button>

<button class="delete" onclick="deleteQuiz('${q._id}')">
Delete
</button>

</div>

</div>

`

})

document.getElementById("quizGrid").innerHTML = html

}

function startQuiz(code){

let name = prompt("Enter your name to start the quiz:")

if(!name) return

name = name.trim()

if(name===""){
alert("Please enter your name")
return
}

name = encodeURIComponent(name)

window.location.href = "/quiz.html?code=" + code + "&name=" + name

}

async function deleteQuiz(id){

let token = prompt("Enter delete token")

if(!token) return

let res = await fetch("/api/quiz/delete/"+id,{
method:"DELETE",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({token})
})

let data = await res.json()

alert(data.message)

loadQuiz()

}

</script>

</body>
</html>
