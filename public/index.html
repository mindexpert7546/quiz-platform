<!DOCTYPE html>
<html>

<head>

<title>Quiz Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#120024,#3b0071,#180032);
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.25);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

.menu a:hover{
color:#00e5ff;
}

.hamburger{
display:none;
font-size:28px;
cursor:pointer;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 8%;
min-height:85vh;
}

.hero-text{
max-width:520px;
}

.hero-text h1{
font-size:55px;
margin-bottom:20px;
line-height:1.2;
}

.hero-text span{
color:#00e5ff;
}

.hero-text p{
opacity:0.8;
margin-bottom:35px;
font-size:16px;
line-height:1.6;
}

/* BUTTONS */

.hero-buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.hero-buttons button{
padding:13px 28px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:500;
transition:0.3s;
}

.hero-buttons button:first-child{
background:#00c853;
color:white;
box-shadow:0 6px 20px rgba(0,200,83,0.4);
}

.hero-buttons button:first-child:hover{
transform:translateY(-2px);
}

.join-btn{
background:#25D366;
color:white;
}

.join-btn:hover{
background:#1ebe5d;
}

/* HERO IMAGE */

.hero img{
width:420px;
max-width:100%;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0px)}
}

/* VIDEO SECTION */

.video-section{
padding:80px 8%;
text-align:center;
}

.video-section h2{
font-size:32px;
margin-bottom:35px;
}

.video-wrapper{
max-width:850px;
margin:auto;
border-radius:14px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.video-wrapper iframe{
width:100%;
height:450px;
border:none;
}

/* QUIZ SECTION */

.quiz-section{
padding:90px 8%;
text-align:center;
}

.quiz-section h2{
font-size:32px;
margin-bottom:50px;
}

/* GRID */

.quiz-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
}

/* CARD */

.quiz-card{
background:rgba(255,255,255,0.07);
padding:30px;
border-radius:14px;
backdrop-filter:blur(15px);
transition:0.35s;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.quiz-card:hover{
transform:translateY(-10px) scale(1.02);
background:rgba(255,255,255,0.1);
}

.quiz-card h3{
margin-bottom:10px;
font-size:20px;
}

.quiz-card p{
opacity:0.75;
font-size:14px;
margin-bottom:20px;
}

.quiz-card button{
background:#00c853;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.quiz-card button:hover{
background:#00b34a;
}

/* FOOTER */

footer{
text-align:center;
padding:35px;
opacity:0.7;
}
/* ============================= */
/* MOBILE RESPONSIVE DESIGN */
/* ============================= */

@media (max-width:768px){

/* NAVBAR */

nav{
padding:15px 20px;
}

.logo{
font-size:18px;
}

/* HAMBURGER */

.hamburger{
display:block;
font-size:26px;
}

/* MOBILE MENU */

.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:15px;
width:220px;
background:#1b0036;
border-radius:10px;
padding:10px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.menu.active{
display:flex;
}

.menu a{
padding:12px 20px;
display:block;
}

/* HERO SECTION */

.hero{
flex-direction:column;
text-align:center;
padding:50px 20px;
min-height:auto;
}

.hero-text{
max-width:100%;
}

.hero-text h1{
font-size:34px;
line-height:1.3;
}

.hero-text p{
font-size:14px;
margin-bottom:25px;
}

/* HERO IMAGE */

.hero img{
width:230px;
margin-top:30px;
}

/* HERO BUTTONS */

.hero-buttons{
justify-content:center;
flex-direction:column;
gap:12px;
}

.hero-buttons button{
width:100%;
max-width:220px;
margin:auto;
}

/* VIDEO */

.video-section{
padding:40px 20px;
}

.video-section h2{
font-size:22px;
}

.video-wrapper iframe{
height:220px;
}

/* QUIZ SECTION */

.quiz-section{
padding:50px 20px;
}

.quiz-section h2{
font-size:24px;
}

/* QUIZ GRID */

.quiz-grid{
grid-template-columns:1fr;
gap:20px;
}

/* QUIZ CARD */

.quiz-card{
padding:20px;
}

/* FOOTER */

footer{
font-size:13px;
padding:20px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">CSE TRE4.0</div>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="all-quiz.html?category=ALL">All Quiz</a>
<a href="all-quiz.html?category=CS">CS</a>
<a href="all-quiz.html?category=GKGS">GKGS</a>
<a href="about.html">About</a>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</nav>

<section class="hero">

<div class="hero-text">

<h1>Online <span>Quizzes</span></h1>

<p>
Test your knowledge with interactive quizzes in Computer Science,
General Knowledge and more.
</p>

<div class="hero-buttons">

<button onclick="location.href='create.html'">
Create Quiz
</button>

<button class="join-btn"
onclick="window.open('https://chat.whatsapp.com/Gh4xu2EsVxdJQGKK0AYILm?mode=gi_t','_blank')">
Join Group
</button>

</div>

</div>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</section>

<section class="video-section">

<h2>How This Quiz Platform Works</h2>

<div class="video-wrapper">

<iframe 
src="https://www.youtube.com/embed/XQQaHybOM6g"
allowfullscreen>
</iframe>

</div>

</section>

<section class="quiz-section">

<h2>Latest Quizzes</h2>

<div class="quiz-grid" id="latestQuiz"></div>

</section>

<footer>
Made with ❤️ by Kundan
</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

async function loadLatestQuiz(){

try{

let res = await fetch("/api/quiz/all?category=ALL")
let quizzes = await res.json()

let latest = quizzes.slice(0,4)

let html = ""

latest.forEach(q=>{

html += `
<div class="quiz-card">
<h3>${q.title}</h3>
<p>${q.description || "Test your knowledge with this quiz."}</p>
<button onclick="startQuiz('${q.quizCode}')">Start Quiz</button>
</div>
`

})

document.getElementById("latestQuiz").innerHTML = html

}catch(err){

console.log("Failed to load quizzes")

}

}

function startQuiz(code){
window.location = "/quiz.html?code=" + code
}

loadLatestQuiz()

</script>

</body>
</html>
