<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Take Quiz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */

body{
background:linear-gradient(135deg,#1c0038,#3c0b6e);
color:white;
min-height:100vh;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

.menu a:hover{
color:#00e5ff;
}

.hamburger{
display:none;
font-size:25px;
cursor:pointer;
}

/* QUIZ WRAPPER */

.quiz-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

/* QUIZ CARD */

.quiz-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:35px;
border-radius:12px;
width:100%;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* TITLES */

#quizTitle{
margin-bottom:10px;
}

#creatorInfo{
opacity:.8;
margin-bottom:20px;
}

/* PROGRESS */

.progress{
margin-bottom:10px;
font-weight:bold;
}

/* PROGRESS BAR */

.progress-bar{
width:100%;
height:8px;
background:#444;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

#progressFill{
height:100%;
width:0%;
background:#00e5ff;
transition:.3s;
}

/* QUESTION */

#questionContainer h3{
margin-bottom:15px;
}

/* OPTIONS */

.option{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:6px;
background:rgba(255,255,255,0.15);
cursor:pointer;
transition:.2s;
}

.option:hover{
background:rgba(255,255,255,0.25);
}

/* CORRECT / WRONG */

.option.correct{
background:#00c853;
}

.option.wrong{
background:#ff5252;
}

.option.disabled{
opacity:.7;
pointer-events:none;
}

/* BUTTONS */

.controls{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.controls button{
background:#00c853;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.controls button:hover{
background:#00b34a;
}

/* RESULT */

#result{
margin-top:20px;
font-size:18px;
}

/* REPORT CARD */

.report-card{
margin-top:30px;
padding:25px;
background:rgba(255,255,255,0.1);
border-radius:10px;
text-align:center;
}

.report-score{
font-size:40px;
font-weight:bold;
margin:15px 0;
}

.report-pass{
color:#00e676;
font-weight:bold;
}

.report-fail{
color:#ff5252;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.menu{
display:none;
flex-direction:column;
background:#2a0050;
position:absolute;
top:70px;
right:20px;
padding:20px;
border-radius:10px;
}

.menu.active{
display:flex;
}

.hamburger{
display:block;
}

.quiz-box{
padding:25px;
}

.controls{
flex-direction:column;
}

.controls button{
width:100%;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">CSE TRE4.0</div>

<div class="menu" id="menu">
<a href="/">Home</a>
<a href="all-quiz.html?category=ALL">All Quiz</a>
<a href="all-quiz.html?category=CS">CS</a>
<a href="all-quiz.html?category=GKGS">GKGS</a>
<a href="create.html">Create Quiz</a>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</nav>


<!-- QUIZ SECTION -->

<div class="quiz-wrapper">

<div class="quiz-box">

<h2 id="quizTitle"></h2>

<p id="creatorInfo"></p>

<div class="progress" id="progress"></div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div id="questionContainer"></div>

<div class="controls">

<button onclick="prevQuestion()">Previous</button>

<button onclick="nextQuestion()">Next</button>

<button onclick="submitQuiz()">Submit Quiz</button>

</div>

<h3 id="result"></h3>

</div>

</div>


<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
