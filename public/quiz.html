<!DOCTYPE html>
<html>

<head>

<title>Take Quiz</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.quiz-box{
background:white;
padding:30px;
border-radius:10px;
width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

.progress{
margin-bottom:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="quiz-box">

<h2 id="quizTitle"></h2>

<p id="creatorInfo"></p>

<div class="progress" id="progress"></div>

<div id="questionContainer"></div>

<div>

<button onclick="prevQuestion()">Previous</button>

<button onclick="nextQuestion()">Next</button>

<button onclick="submitQuiz()">Submit Quiz</button>

</div>

<h3 id="result"></h3>

</div>

<script src="script.js"></script>

</body>

</html>
