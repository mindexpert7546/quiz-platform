<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Take Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BACKGROUND */

body{
background:linear-gradient(135deg,#120024,#3b0071,#180032);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
position:sticky;
top:0;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:600;
letter-spacing:1px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

.menu a:hover{
color:#00e5ff;
}

.hamburger{
display:none;
font-size:28px;
cursor:pointer;
}

/* QUIZ WRAPPER */

.quiz-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

/* QUIZ CARD */

.quiz-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:40px;
border-radius:16px;
width:100%;
max-width:700px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

/* TITLES */

#quizTitle{
margin-bottom:10px;
font-size:26px;
}

#creatorInfo{
opacity:.8;
margin-bottom:20px;
}

/* PROGRESS */

.progress{
margin-bottom:10px;
font-weight:bold;
}

/* PROGRESS BAR */

.progress-bar{
width:100%;
height:10px;
background:#333;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

#progressFill{
height:100%;
width:0%;
background:#00e5ff;
transition:0.4s;
}

/* QUESTION */

#questionContainer h3{
margin-bottom:18px;
}

/* OPTIONS */

.option{
display:block;
padding:14px;
margin-bottom:12px;
border-radius:8px;
background:rgba(255,255,255,0.15);
cursor:pointer;
transition:0.25s;
}

.option:hover{
background:rgba(255,255,255,0.25);
transform:translateX(3px);
}

/* CORRECT / WRONG */

.option.correct{
background:#00c853;
}

.option.wrong{
background:#ff5252;
}

.option.disabled{
opacity:.7;
pointer-events:none;
}

/* BUTTONS */

.controls{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.controls button{
background:#00c853;
border:none;
padding:12px 22px;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.25s;
font-size:15px;
}

.controls button:hover{
background:#00b34a;
transform:translateY(-1px);
}

/* RESULT */

#result{
margin-top:20px;
font-size:18px;
}

/* REPORT CARD */

.report-card{
margin-top:30px;
padding:25px;
background:rgba(255,255,255,0.1);
border-radius:12px;
text-align:center;
}

.report-score{
font-size:42px;
font-weight:bold;
margin:15px 0;
}

.report-pass{
color:#00e676;
font-weight:bold;
}

.report-fail{
color:#ff5252;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

nav{
padding:15px 20px;
}

.logo{
font-size:18px;
}

.hamburger{
display:block;
}

/* MOBILE MENU */

.menu{
display:none;
flex-direction:column;
position:absolute;
top:65px;
right:15px;
width:220px;
background:#1b0036;
border-radius:10px;
padding:12px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.menu.active{
display:flex;
}

.menu a{
padding:12px 20px;
display:block;
}

/* QUIZ CARD */

.quiz-box{
padding:28px 22px;
}

/* BUTTONS STACK */

.controls{
flex-direction:column;
}

.controls button{
width:100%;
}

/* QUESTION TEXT */

#questionContainer h3{
font-size:18px;
}

.option{
font-size:15px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">CSE TRE4.0</div>

<div class="menu" id="menu">
<a href="/">Home</a>
<a href="all-quiz.html?category=ALL">All Quiz</a>
<a href="all-quiz.html?category=CS">CS</a>
<a href="all-quiz.html?category=GKGS">GKGS</a>
<a href="create.html">Create Quiz</a>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

</nav>


<!-- QUIZ SECTION -->

<div class="quiz-wrapper">

<div class="quiz-box">

<h2 id="quizTitle"></h2>

<p id="creatorInfo"></p>

<div class="progress" id="progress"></div>

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div id="questionContainer"></div>

<div class="controls">

<button id="prevBtn" onclick="prevQuestion()">Previous</button>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

<button onclick="submitQuiz()">Submit Quiz</button>

</div>

<h3 id="result"></h3>

</div>

</div>


<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active")
}

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
