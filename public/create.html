<!DOCTYPE html>
<html>

<head>
<title>Create Quiz</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
padding:30px;
width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Quiz</h2>

<input id="title" placeholder="Quiz Title">

<input id="description" placeholder="Description">

<input id="creator" placeholder="Created By">

<p>Paste Minimum 10 Questions JSON</p>

<textarea id="questions" rows="10"></textarea>

<button onclick="createQuiz()">Create Quiz</button>

<p id="link"></p>

</div>

<script src="script.js"></script>

</body>

</html>
